<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Свадьба</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
  <h1 id="names"></h1>
  <p id="date"></p>
</section>

<section>
  <h2>О событии</h2>
  <p id="message"></p>
</section>

<section>
  <h2>Программа</h2>
  <div id="schedule"></div>
</section>

<section>
  <h2>Место</h2>
  <p id="location"></p>
</section>

<section>
  <h2>Подтверждение</h2>
  <form id="form">
    <input type="text" id="name" placeholder="Ваше имя" required>
    <select id="status">
      <option>Приду</option>
      <option>Не смогу</option>
    </select>
    <button type="submit">Отправить</button>
  </form>
  <p id="thanks"></p>
</section>

<script src="script.js"></script>

</body>
</html>
